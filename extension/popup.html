<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a1a2e;
      background: #fafafa;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px;
      color: #6c3fb5;
    }
    p {
      font-size: 13px;
      color: #555;
      margin: 0;
      line-height: 1.4;
    }
    .hidden {
      display: none;
    }
    .player-name {
      color: #6c3fb5;
      font-weight: 600;
    }
    .status-icon {
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <h1>AlteredHistory</h1>
  <div id="status-loading">
    <p>Checking connection...</p>
  </div>
  <div id="status-connected" class="hidden">
    <p><span class="status-icon">&#9989;</span>Connected as <span id="player-name" class="player-name"></span></p>
  </div>
  <div id="status-disconnected" class="hidden">
    <p>Please navigate to your BGA game history page while logged in, then reopen this popup.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
