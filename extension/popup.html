<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a1a2e;
      background: #fafafa;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px;
      color: #6c3fb5;
    }
    p {
      font-size: 13px;
      color: #555;
      margin: 0;
      line-height: 1.4;
    }
    .hidden {
      display: none;
    }
    .player-name {
      color: #6c3fb5;
      font-weight: 600;
    }
    .status-icon {
      margin-right: 4px;
    }
    #import-section {
      margin-top: 12px;
    }
    #import-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #cutoff-date {
      font-size: 12px;
      flex: 1;
      padding: 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #btn-import {
      background: #6c3fb5;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    #btn-import:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .progress-bar {
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #6c3fb5;
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }
    #progress-text {
      margin-top: 4px;
      font-size: 12px;
    }
    #import-summary p {
      font-size: 12px;
      margin-top: 2px;
    }
    #import-error p {
      font-size: 12px;
      color: #d32f2f;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>AlteredHistory</h1>
  <div id="status-loading">
    <p>Checking connection...</p>
  </div>
  <div id="status-connected" class="hidden">
    <p><span class="status-icon">&#9989;</span>Connected as <span id="player-name" class="player-name"></span></p>
    <div id="import-section">
      <div id="import-controls">
        <input type="datetime-local" id="cutoff-date">
        <button id="btn-import">Importer</button>
      </div>
      <div id="import-progress" class="hidden">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <p id="progress-text"></p>
      </div>
      <div id="import-summary" class="hidden">
        <p id="summary-imported"></p>
        <p id="summary-already-exists"></p>
        <p id="summary-skipped"></p>
        <p id="summary-failed"></p>
      </div>
      <div id="import-error" class="hidden">
        <p id="error-message"></p>
      </div>
    </div>
  </div>
  <div id="status-disconnected" class="hidden">
    <p>Please navigate to your BGA game history page while logged in, then reopen this popup.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
